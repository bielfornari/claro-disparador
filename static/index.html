<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadHunter - CRM Sincronizado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#17171a;--surface2:#1e1e23;
  --border:#2a2a32;--border2:#38383f;
  --text:#f0f0f4;--muted:#8a8a9a;
  --accent:#7c5cfc;--accent2:#b4a0fd;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --red:#f87171;--red-bg:rgba(248,113,113,0.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);
  --wa:#25d366;--wa-bg:rgba(37,211,102,0.1);
  --r:14px;--rs:9px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2.5rem 1rem 5rem}
.wrap{max-width:860px;margin:0 auto}

/* ESTILOS DO LOGIN */
#login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--surface); padding:2.5rem; border-radius:var(--r); border:1px solid var(--border); width:90%; max-width:400px; text-align:center; }
.login-box h2 { font-family:'Syne',sans-serif; margin-bottom:1rem; }
.login-box input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--rs); padding:12px; font-size:15px; color:var(--text); outline:none; margin-bottom:1rem; text-align:center; transition:border-color .15s}
.login-box input:focus { border-color:var(--accent); }
.login-box button { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:var(--rs); font-size:15px; font-weight:600; cursor:pointer; font-family:'Syne',sans-serif; transition:opacity .15s;}
.login-box button:hover { opacity:0.87; }

header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:2rem}
.logo{display:flex;align-items:center;gap:11px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo h1{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;letter-spacing:-.3px}
.logo p{font-size:12px;color:var(--muted);margin-top:1px}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge-pill{font-size:12px;padding:6px 13px;border-radius:99px;border:1px solid}
.badge-user{color:var(--amber);background:var(--amber-bg);border-color:rgba(245,158,11,.22); cursor:pointer;}
.badge-total{color:var(--muted);background:var(--surface);border-color:var(--border);cursor:pointer;transition:border-color .15s}

.tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:1.25rem}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.tab.on{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;margin-bottom:1.25rem}
.panel-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:1.25rem;font-weight:500}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--muted);font-weight:500}
.field input,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1e1e23}
.full{grid-column:1/-1}

.btn-search{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;margin-top:1.25rem;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-search:hover{opacity:.87}
.btn-search:disabled{opacity:.3;cursor:not-allowed}

.status-wrap{display:none;text-align:center;padding:1.5rem}
.status-txt{font-size:13px;color:var(--muted)}
.prog{height:2px;background:var(--border);border-radius:99px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;width:0%}

.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:.9rem;text-align:center}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px}

.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.rh-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:600}
.rh-acts{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:8px 14px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px; transition:background .15s}
.btn-sm:hover{background:var(--surface2)}

.status-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.sf{padding:6px 12px;border:1px solid var(--border);border-radius:99px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s; font-family:'DM Sans',sans-serif}
.sf.on{font-weight:500}
.sf-all.on{border-color:var(--accent2);color:var(--accent2);background:rgba(124,92,252,.1)}
.sf-novo.on{border-color:var(--muted);color:var(--text);background:var(--surface2)}
.sf-contatado.on{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}
.sf-fechado.on{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.sf-descartado.on{border-color:var(--red);color:var(--red);background:var(--red-bg)}

/* ACORDEÃO E GRUPOS */
details.group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 1rem; transition: border-color .15s; }
details.group:hover { border-color: var(--border2); }
details.group > summary { list-style: none; cursor: pointer; padding: 1.2rem 1.5rem; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; user-select: none; transition: background .15s; border-radius: var(--r); }
details.group > summary::-webkit-details-marker { display: none; }
details.group > summary:hover { background: var(--surface2); }
details.group[open] > summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: 1px solid var(--border); }
.group-content { padding: 1.25rem; background: var(--bg); border-bottom-left-radius: var(--r); border-bottom-right-radius: var(--r); }
.g-count { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--accent2); background: rgba(124,92,252,.1); padding: 4px 10px; border-radius: 99px; border: 1px solid rgba(124,92,252,.2); }
.group-title { display: flex; align-items: center; gap: 10px; color: var(--text); }
.group-title svg { width: 18px; height: 18px; stroke: var(--muted); stroke-width: 2.5; fill: none; transition: transform 0.2s; }
details.group[open] .group-title svg { transform: rotate(90deg); stroke: var(--accent); }

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:10px;}
.card:last-child{margin-bottom:0;}
.card.status-contatado{border-left:3px solid var(--amber)}
.card.status-fechado{border-left:3px solid var(--green)}
.card.status-descartado{border-left:3px solid var(--red);opacity:.6}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;line-height:1.3}
.card-right{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.b{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500;white-space:nowrap;border:1px solid transparent}
.b-open{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.2)}
.b-closed{background:var(--red-bg);color:var(--red);border-color:rgba(248,113,113,.2)}
.b-novo{background:var(--surface2);color:var(--muted);border-color:var(--border)}
.b-contatado{background:var(--amber-bg);color:var(--amber);border-color:rgba(245,158,11,.2)}
.b-fechado{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.2)}
.b-descartado{background:var(--red-bg);color:var(--red);border-color:rgba(248,113,113,.2)}
.b-dup{background:rgba(124,92,252,.1);color:var(--accent2);border-color:rgba(124,92,252,.2)}

.rows{display:grid;gap:8px}
.row{display:flex;align-items:flex-start;gap:10px}
.row-icon{width:30px;height:30px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.row-body{display:flex;flex-direction:column;gap:1px;padding-top:4px}
.row-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.row-val{font-size:14px;color:var(--text);line-height:1.4}
.row-val.phone{font-size:16px;font-family:'Syne',sans-serif;font-weight:600;color:var(--accent2)}
.row-val.notel{color:var(--muted);font-style:italic;font-size:13px}

.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn-act{padding:7px 13px;border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;border:none;font-weight:500;text-decoration:none}
.act-wa{background:var(--wa-bg);color:var(--wa);border:1px solid rgba(37,211,102,.2)}

.status-select{margin-left:auto;padding:7px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.note-row{margin-top:8px}
.note-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--text);outline:none;resize:none; font-family:'DM Sans',sans-serif;}

.hist-search{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-size:14px;width:100%;margin-bottom:1rem;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.summary{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2>Acesso ao CRM</h2>
    <p style="color:var(--muted); font-size:13px; margin-bottom:20px;">Digite sua senha de acesso</p>
    <input type="password" id="senha" placeholder="Sua senha" onkeypress="if(event.key==='Enter') window.fazerLogin()"/>
    <button onclick="window.fazerLogin()">Entrar</button>
  </div>
</div>

<div class="wrap" id="app-content" style="display:none;">

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <div>
      <h1>LeadHunter</h1>
      <p>Buscador Inteligente & CRM Nuvem</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="badge-pill badge-user" id="badgeUser" onclick="window.sair()">Admin (Sair)</div>
    <div class="badge-pill badge-total" id="badgeTotal" onclick="window.setTab('hist')">0 leads salvos</div>
  </div>
</header>

<div class="tabs" id="menu-tabs">
  <button class="tab on" id="tab-busca" onclick="window.setTab('busca')">Buscar leads</button>
  <button class="tab" id="tab-hist" onclick="window.setTab('hist')">Histórico & CRM</button>
</div>

<div id="pane-busca">
  <div class="panel">
    <div class="panel-label">Parâmetros de busca</div>
    <div class="form-grid">
      <div class="field">
        <label>Segmento</label>
        <input type="text" id="segmento" placeholder="ex: dentista, academia, padaria"/>
      </div>
      <div class="field">
        <label>Cidade / região</label>
        <input type="text" id="cidade" placeholder="ex: Palmas TO"/>
      </div>
      <div class="field full">
        <label>Quantidade</label>
        <select id="qtd">
          <option value="5">5 leads</option>
          <option value="10" selected>10 leads</option>
          <option value="20">20 leads</option>
          <option value="60">Máximo (~60)</option>
        </select>
      </div>
    </div>
    <button class="btn-search" id="btnB" onclick="window.buscar()">Buscar e Salvar no CRM Nuvem</button>
  </div>

  <div class="status-wrap" id="sw">
    <div class="status-txt" id="st">Buscando...</div>
    <div class="prog"><div class="prog-fill" id="pf"></div></div>
  </div>

  <div id="res"></div>
</div>

<div id="pane-hist" style="display:none">
  <input class="hist-search" id="histSearch" placeholder="Buscar por nome, telefone, cidade..." oninput="window.renderHist()"/>
  <div class="status-filter">
    <button class="sf sf-all on" data-s="all" onclick="window.setStatusFilter('all')">Todos</button>
    <button class="sf sf-novo" data-s="novo" onclick="window.setStatusFilter('novo')">Novos</button>
    <button class="sf sf-contatado" data-s="contatado" onclick="window.setStatusFilter('contatado')">Contatados</button>
    <button class="sf sf-fechado" data-s="fechado" onclick="window.setStatusFilter('fechado')">Fechados</button>
    <button class="sf sf-descartado" data-s="descartado" onclick="window.setStatusFilter('descartado')">Descartados</button>
  </div>
  <div id="hist-summary" style="margin-bottom:1rem"></div>
  
  <div class="rh">
    <div class="rh-title" id="hist-count">0 leads</div>
    <div class="rh-acts">
      <button class="btn-sm" onclick="window.expCSVTudo()">↓ Exportar TODO o CRM (CSV)</button>
    </div>
  </div>

  <div id="hist-list"></div>
</div>
  
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj6zwAHo37Orengs-cfRuFiiCkzDxer4Y",
  authDomain: "disprador-f965b.firebaseapp.com",
  projectId: "disprador-f965b",
  storageBucket: "disprador-f965b.firebasestorage.app",
  messagingSenderId: "739900427310",
  appId: "1:739900427310:web:631a4f8bcd5b2e71ac23bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const P = ''; 
let currentTab = 'busca';
let statusFilter = 'all';
let searchResults = [];
let globalLeads = []; 
let userRole = localStorage.getItem('userRole') || '';

// 1. SISTEMA DE LOGIN COM NOVAS SENHAS
window.fazerLogin = function() {
    const senha = document.getElementById('senha').value;
    if(senha === 'fornoadmin123.') {
        userRole = 'admin';
        iniciarApp();
    } else if(senha === 'vendedor1') {
        userRole = 'vendedor';
        iniciarApp();
    } else {
        alert('Senha incorreta!');
    }
}

window.sair = function() {
    localStorage.removeItem('userRole');
    location.reload();
}

function iniciarApp() {
    localStorage.setItem('userRole', userRole);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app-content').style.display = 'block';
    
    document.getElementById('badgeUser').textContent = userRole === 'admin' ? 'Admin (Sair)' : 'Vendedor (Sair)';

    if(userRole === 'vendedor') {
        document.getElementById('tab-busca').style.display = 'none'; 
        window.setTab('hist'); 
    } else {
        window.setTab('busca');
    }
}

// 2. SINCRONIZAÇÃO EM TEMPO REAL COM FIREBASE
onSnapshot(collection(db, "leads"), (snapshot) => {
    globalLeads = snapshot.docs.map(doc => doc.data());
    globalLeads.sort((a,b) => (b._savedAt || 0) - (a._savedAt || 0));
    
    document.getElementById('badgeTotal').textContent = globalLeads.length + ' leads salvos';
    
    if(currentTab === 'hist') window.renderHist();
});

window.upsertLeadFirebase = async function(lead) {
    const ref = doc(db, "leads", lead.place_id);
    const exists = globalLeads.find(l => l.place_id === lead.place_id);
    if(!exists) {
        await setDoc(ref, { ...lead, _status:'novo', _note:'', _savedAt: Date.now() });
        return true; 
    }
    return false; 
}

window.mudarStatus = async function(pid, val) {
    await updateDoc(doc(db, "leads", pid), { _status: val });
}

window.updateNota = async function(pid, texto) {
    await updateDoc(doc(db, "leads", pid), { _note: texto });
}

window.setTab = function(t) {
  currentTab = t;
  document.getElementById('pane-busca').style.display = t === 'busca' ? 'block' : 'none';
  document.getElementById('pane-hist').style.display = t === 'hist' ? 'block' : 'none';
  document.getElementById('tab-busca').classList.toggle('on', t === 'busca');
  document.getElementById('tab-hist').classList.toggle('on', t === 'hist');
  if(t === 'hist') window.renderHist();
}

window.setStatusFilter = function(s) {
  statusFilter = s;
  document.querySelectorAll('.sf').forEach(el => el.classList.toggle('on', el.dataset.s === s));
  window.renderHist();
}

function setStatus(msg, pct, hide) {
  const w = document.getElementById('sw');
  w.style.display = hide ? 'none' : 'block';
  document.getElementById('st').textContent = msg;
  document.getElementById('pf').style.width = (pct || 0) + '%';
}

// 3. MENSAGEM DE WHATSAPP DO VENDEDOR
window.wa = function(raw, nomeEmpresa) {
  if(!raw) return null;
  const d = raw.replace(/\D/g,'');
  const nome = nomeEmpresa ? nomeEmpresa : 'vocês';
  const msg = encodeURIComponent(`Oii, bom dia! Eu falo no/na/com ${nome}?`);
  return 'https://wa.me/' + (d.startsWith('55') ? d : '55'+d) + '?text=' + msg;
}

window.buscar = async function() {
  const seg = document.getElementById('segmento').value.trim();
  const cid = document.getElementById('cidade').value.trim();
  const qtd = parseInt(document.getElementById('qtd').value);
  if(!seg || !cid) { alert('Preencha segmento e cidade.'); return; }
  
  const btn = document.getElementById('btnB');
  btn.disabled = true; searchResults = [];
  document.getElementById('res').innerHTML = '';
  setStatus('Buscando no Google Maps...', 10);
  
  try {
    const q = `${seg} em ${cid}`;
    let tok = null, pg = 0, max = qtd <= 20 ? 2 : 3, raw = [];
    while(raw.length < qtd && pg < max) {
      if(tok) await new Promise(r => setTimeout(r, 2200));
      let url = `${P}/api/search?query=${encodeURIComponent(q)}`;
      if(tok) url += `&pagetoken=${encodeURIComponent(tok)}`;
      const d = await fetch(url).then(r => r.json());
      if(d.status === 'ZERO_RESULTS') break;
      if(d.error_message) throw new Error(d.error_message);
      for(const r of (d.results||[])) { if(raw.length >= qtd) break; raw.push(r); }
      tok = d.next_page_token || null; if(!tok) break; pg++;
    }
    
    if(!raw.length) { setStatus('Nenhum resultado.', 0); btn.disabled = false; return; }
    
    const det = [];
    for(let i = 0; i < raw.length; i++) {
      setStatus(`Salvando no CRM: ${i+1}/${raw.length}...`, 10 + Math.round(i/raw.length * 85));
      const d = await fetch(`${P}/api/details?place_id=${encodeURIComponent(raw[i].place_id)}`).then(r => r.json());
      // Guarda o segmento e cidade para organizar as pastas
      const lead = {...raw[i], ...(d.result||{}), _segmento: seg, _cidade: cid};
      
      const isNew = await window.upsertLeadFirebase(lead);
      det.push({...lead, _isNew: isNew});
      await new Promise(r => setTimeout(r, 80));
    }
    searchResults = det;
    setStatus('', 100, true);
    window.renderSearch(searchResults);
  } catch(e) { setStatus('Erro: ' + e.message, 0); }
  btn.disabled = false;
}

window.renderSearch = function(filt) {
  const ct = filt.filter(l => l.formatted_phone_number).length;
  const novos = filt.filter(l => l._isNew).length;
  const dups = filt.length - novos;

  let h = `
  <div class="summary">
    <div class="stat"><div class="stat-n">${filt.length}</div><div class="stat-l">encontrados</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${novos}</div><div class="stat-l">novos no CRM</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--accent2)">${dups}</div><div class="stat-l">já existiam</div></div>
    <div class="stat"><div class="stat-n">${ct}</div><div class="stat-l">com telefone</div></div>
  </div>`;

  for(const l of filt) {
    const ab = l.opening_hours?.open_now;
    const th = l.opening_hours !== undefined;
    const wl = window.wa(l.formatted_phone_number, l.name);
    const saved = globalLeads.find(x => x.place_id === l.place_id);
    const st = saved?._status || 'novo';
    h += cardHTML(l, st, wl, ab, th, !l._isNew, saved?._note || '');
  }
  document.getElementById('res').innerHTML = h;
}

function cardHTML(l, st, wl, ab, th, isDup, nota) {
  return `
  <div class="card status-${st}" id="card-${l.place_id}">
    <div class="card-top">
      <div class="card-name">${l.name||'—'}</div>
      <div class="card-right">
        ${isDup ? '<span class="b b-dup">já no CRM</span>' : ''}
        ${th ? `<span class="b ${ab?'b-open':'b-closed'}">${ab?'Aberto':'Fechado'}</span>` : ''}
        <span class="b b-${st}">${st.charAt(0).toUpperCase()+st.slice(1)}</span>
      </div>
    </div>
    <div class="rows">
      <div class="row">
        <div class="row-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.5 16z"/></svg></div>
        <div class="row-body"><span class="row-label">Telefone</span><span class="row-val ${l.formatted_phone_number?'phone':'notel'}">${l.formatted_phone_number||'não disponível'}</span></div>
      </div>
      ${l.formatted_address ? `<div class="row"><div class="row-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="row-body"><span class="row-label">Endereço</span><span class="row-val">${l.formatted_address}</span></div></div>` : ''}
    </div>
    <div class="note-row">
      <textarea class="note-input" rows="1" placeholder="Anotação (sincroniza p/ todos)..." onchange="window.updateNota('${l.place_id}', this.value)">${nota}</textarea>
    </div>
    <div class="actions">
      ${wl ? `<a href="${wl}" target="_blank" class="btn-act act-wa"><svg viewBox="0 0 24 24" style="width:13px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> WhatsApp</a>` : ''}
      <select class="status-select" onchange="window.mudarStatus('${l.place_id}', this.value)">
        <option value="novo" ${st==='novo'?'selected':''}>Novo</option>
        <option value="contatado" ${st==='contatado'?'selected':''}>Contatado</option>
        <option value="fechado" ${st==='fechado'?'selected':''}>Fechado</option>
        <option value="descartado" ${st==='descartado'?'selected':''}>Descartado</option>
      </select>
    </div>
  </div>`;
}

window.renderHist = function() {
  const q = (document.getElementById('histSearch').value || '').toLowerCase();
  let all = globalLeads;
  
  if(q) all = all.filter(l => (l.name||'').toLowerCase().includes(q) || (l.formatted_phone_number||'').includes(q) || (l.formatted_address||'').toLowerCase().includes(q));
  if(statusFilter !== 'all') all = all.filter(l => l._status === statusFilter);

  const stats = {
      novo: globalLeads.filter(l=>l._status==='novo').length,
      contatado: globalLeads.filter(l=>l._status==='contatado').length,
      fechado: globalLeads.filter(l=>l._status==='fechado').length,
      descartado: globalLeads.filter(l=>l._status==='descartado').length
  };
  
  document.getElementById('hist-summary').innerHTML = `
  <div class="summary">
    <div class="stat"><div class="stat-n">${globalLeads.length}</div><div class="stat-l">total</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--muted)">${stats.novo}</div><div class="stat-l">novos</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--amber)">${stats.contatado}</div><div class="stat-l">contatados</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${stats.fechado}</div><div class="stat-l">fechados</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${stats.descartado}</div><div class="stat-l">descartados</div></div>
  </div>`;

  document.getElementById('hist-count').textContent = all.length + ' leads visíveis';

  // Agrupamento (Acordeão)
  const grupos = {};
  for(const l of all) {
    const nomeGrupo = (l._segmento && l._cidade) ? `${l._segmento} — ${l._cidade}`.toUpperCase() : 'BUSCAS ANTIGAS / GERAL';
    if(!grupos[nomeGrupo]) grupos[nomeGrupo] = [];
    grupos[nomeGrupo].push(l);
  }

  let h = '';
  const nomesDosGrupos = Object.keys(grupos);

  if(nomesDosGrupos.length === 0){
    h = `<div class="empty">Nenhum lead encontrado.</div>`;
  } else {
    for(const nome of nomesDosGrupos) {
      const leadsDoGrupo = grupos[nome];
      
      h += `
      <details class="group">
        <summary>
          <div class="group-title">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            ${nome}
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn-sm" onclick="event.preventDefault(); window.expCSVGrupo('${nome}')" style="padding: 4px 8px; font-size:11px; font-weight:normal;">↓ Baixar Lista</button>
            <div class="g-count">${leadsDoGrupo.length} leads</div>
          </div>
        </summary>
        <div class="group-content">
      `;
      
      for(const l of leadsDoGrupo){
        const wl = window.wa(l.formatted_phone_number, l.name);
        h += cardHTML(l, l._status || 'novo', wl, l.opening_hours?.open_now, l.opening_hours !== undefined, false, l._note || '');
      }
      h += `</div></details>`;
    }
  }
  document.getElementById('hist-list').innerHTML = h;
}

// 4. FUNÇÕES DE EXPORTAR CSV (POR LISTA OU TUDO)
window.gerarCSV = function(arrayLeads, nomeArquivo) {
  if(!arrayLeads.length) { alert('Nenhum lead para exportar.'); return; }
  const cols = ['Segmento/Lista','Nome','Telefone','Endereço','Status CRM','Anotação','Link WhatsApp'];
  const rows = arrayLeads.map(l => {
    const lista = (l._segmento && l._cidade) ? `${l._segmento} - ${l._cidade}` : 'Geral';
    return [lista, l.name||'', l.formatted_phone_number||'', l.formatted_address||'', l._status||'novo', l._note||'', window.wa(l.formatted_phone_number, l.name)||''];
  });
  const csv = [cols, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'})), download: nomeArquivo + '.csv' });
  a.click();
}

window.expCSVTudo = function() {
  window.gerarCSV(globalLeads, 'CRM_Completo_LeadHunter');
}

window.expCSVGrupo = function(nomeDoGrupo) {
  const leadsDoGrupo = globalLeads.filter(l => {
      const n = (l._segmento && l._cidade) ? `${l._segmento} — ${l._cidade}`.toUpperCase() : 'BUSCAS ANTIGAS / GERAL';
      return n === nomeDoGrupo;
  });
  window.gerarCSV(leadsDoGrupo, `Lista_${nomeDoGrupo.replace(/\s/g, '_')}`);
}

// Inicializa a aplicação se já houver sessão
if(userRole) {
    iniciarApp();
}
</script>
